name: Privacy Scan

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for sensitive usernames and local paths
        run: bash scripts/check-sensitive-paths.sh
